name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: log-anonymiser
            archive: log-anonymiser-linux-x86_64.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: log-anonymiser.exe
            archive: log-anonymiser-windows-x86_64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Linux)
        if: runner.os == 'Linux'
        run: |
          tar -czf ${{ matrix.archive }} \
            -C target/${{ matrix.target }}/release \
            ${{ matrix.binary }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.binary }} `
            -DestinationPath ${{ matrix.archive }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
